version: 2

models:
  - name: int_item_sales
    columns:
      - name: item_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_items')
              field: item_id
  - name: int_item_daily_resale
    columns:
      - name: item_id
        tests: [not_null]
      - name: sold_price_usd
        tests: [not_null]
  - name: int_listing_liquidity
    columns:
      - name: item_id
        tests: [unique, not_null]
