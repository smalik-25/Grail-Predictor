version: 2

models:
  - name: int_family_sales
    columns:
      - name: family_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_style_families')
              field: family_id
  - name: int_family_daily_resale
    columns:
      - name: family_id
        tests: [not_null]
      - name: sold_price_usd
        tests: [not_null]
  - name: int_family_liquidity
    columns:
      - name: family_id
        tests: [unique, not_null]
