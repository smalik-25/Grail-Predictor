version: 2

models:
  - name: mart_family_price_history
    columns:
      - name: price_history_key
        tests: [unique, not_null]
      - name: family_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_style_families')
              field: family_id
      - name: spread_basis
        tests:
          - accepted_values:
              values: ['brand_proxy', 'item']
  - name: mart_family_current_state
    columns:
      - name: family_id
        tests: [unique, not_null]
      - name: n_listings
        tests: [not_null]
      - name: spread_basis
        tests:
          - accepted_values:
              values: ['brand_proxy', 'item']
